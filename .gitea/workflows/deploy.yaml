name: Run Tests

# Note: when running this workflow locally with `act`, use host networking so the container
# can reach a local Gitea instance on localhost:3000, for example:
#   act -j test --container-network host
# or use the provided script: `./scripts/run_act_host.sh test <registry> <user> <token>`

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITEA_URL: "http://code.dontmover.ru/dontmover/proxmox-metrics.git"
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout code (clone from Gitea)
        env:
          GITEA_USERNAME: ${{ secrets.GITEA_USERNAME || '' }}
          GITEA_TOKEN: ${{ secrets.GITEATOKEN || env.GITEA_TOKEN || '' }}
        run: |
          set -eux
          rm -rf ./* ./.git || true
          # Try unauthenticated clone first
          if git clone --depth 1 "$GITEA_URL" .; then
            echo "Cloned from $GITEA_URL"
          else
            if [ -n "$GITEA_USERNAME" ] && [ -n "$GITEA_TOKEN" ]; then
              # Inject credentials into URL (may be required for private repos)
              AUTH_URL=$(echo "$GITEA_URL" | sed -E 's#https?://##')
              git clone --depth 1 "https://$GITEA_USERNAME:$GITEA_TOKEN@$AUTH_URL" .
            else
              echo "Failed to clone $GITEA_URL and no credentials provided" >&2
              exit 1
            fi
          fi
          if [ -n "${GITHUB_SHA-}" ]; then
            git fetch --depth=1 origin "$GITHUB_SHA" || true
            git checkout -qf "$GITHUB_SHA" || true
          fi

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          # uv installs to ~/.local/bin by default
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          uv sync

      - name: Install dev dependencies
        run: |
          # Ensure development extras (pytest, pytest-cov, etc.) are installed inside uv environment
          uv run pip install --no-cache-dir "[.dev]" || uv run pip install --no-cache-dir ".[dev]"

      - name: Verify syntax
        run: |
          python scripts/verify_syntax.py

      - name: Run tests with coverage
        run: |
          # run tests through uv so dependencies and env are handled
          uv run pytest src/tests -v --cov=src --cov-report=term-missing --cov-report=html

      - name: Upload artifacts to Gitea (via API)
        if: always()
        env:
          GITEA_URL: ${{ env.GITEA_URL }}
          GITEA_TOKEN: ${{ secrets.GITEATOKEN || env.GITEA_TOKEN || '' }}
          GITEA_OWNER: dontmover
          GITEA_REPO: proxmox-metrics
        run: |
          set -eux
          if [ -z "${GITEA_TOKEN}" ]; then
            echo "GITEA_TOKEN not set; skipping artifact upload"
            exit 0
          fi
          # derive API base (e.g. https://code.dontmover.ru/api/v1)
          host=$(echo "$GITEA_URL" | sed -E 's#https?://([^/]+).*#\1#')
          API_BASE="https://$host/api/v1"

          # create a draft release for this run
          TAG=${GITHUB_SHA:-"artifacts-$(date +%s)"}
          RELEASE_NAME="ci-artifacts-${TAG}"
          resp=$(curl -sS -X POST "${API_BASE}/repos/${GITEA_OWNER}/${GITEA_REPO}/releases" \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\": \"${TAG}\", \"name\": \"${RELEASE_NAME}\", \"draft\": true}")
          release_id=$(python -c 'import sys, json
data=json.load(sys.stdin)
print(data.get("id", ""))' <<<"$resp")
          if [ -z "$release_id" ]; then
            echo "Failed to create release, response:" >&2
            echo "$resp" >&2
            exit 1
          fi

          upload_asset() {
            file_path="$1"
            if [ ! -f "$file_path" ]; then
              return 0
            fi
            name=$(basename "$file_path")
            echo "Uploading $file_path as $name"
            curl -sS -X POST "${API_BASE}/repos/${GITEA_OWNER}/${GITEA_REPO}/releases/${release_id}/assets?name=${name}" \
              -H "Authorization: token ${GITEA_TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@${file_path}"
          }

          # upload htmlcov files
          if [ -d htmlcov ]; then
            find htmlcov -type f | while read -r f; do upload_asset "$f"; done
          fi

          # upload dist files
          if [ -d dist ]; then
            find dist -type f | while read -r f; do upload_asset "$f"; done
          fi

name: Run Tests

# Note: when running this workflow locally with `act`, use host networking so the container
# can reach a local Gitea instance on localhost:3000, for example:
#   act -j test --container-network host
# or use the provided script: `./scripts/run_act_host.sh test <registry> <user> <token>`

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          uv sync

      - name: Verify syntax
        run: |
          python scripts/verify_syntax.py

      - name: Run tests with coverage
        run: |
          pytest src/tests -v --cov=src --cov-report=term-missing --cov-report=html

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 30

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v3
        with:
          name: python-package-distributions
          path: dist/
          retention-days: 30

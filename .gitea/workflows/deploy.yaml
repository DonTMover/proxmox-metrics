name: Build and Test

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.vars.outputs.image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to registry
        env:
          REGISTRY_URL: ${{ secrets.REGISTRY_URL }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
        run: |
          echo "$REGISTRY_TOKEN" | docker login "$REGISTRY_URL" -u "$REGISTRY_USERNAME" --password-stdin

      - name: Build image
        run: |
          IMAGE="${REGISTRY_URL}/proxmox-metrics:${GITHUB_SHA}"
          docker build -t "$IMAGE" .
          echo "$IMAGE" > image.txt

      - name: Push image
        run: |
          IMAGE=$(cat image.txt)
          docker push "$IMAGE"

      - name: Set output image
        id: vars
        run: |
          echo "image=$(cat image.txt)" >> $GITHUB_OUTPUT

  build-and-test:
    needs: build-and-push-image
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.build-and-push-image.outputs.image }}
    strategy:
      matrix:
        python-version: ["3.11"]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          uv sync

      - name: Verify syntax
        run: |
          python scripts/verify_syntax.py

      - name: Run tests with coverage
        run: |
          pytest src/tests -v --cov=src --cov-report=term-missing --cov-report=html

      - name: Build package
        run: |
          uv build

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 30

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v3
        with:
          name: python-package-distributions
          path: dist/
          retention-days: 30

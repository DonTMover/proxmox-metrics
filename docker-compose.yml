version: '3.8'

services:
  proxmox-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: proxmox-monitor-test
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      # Optional: Pass bot token via environment variable
      # Set in .env file: PROXMOX_BOT_TOKEN=your_token_here
      # See .env.example for reference
      - PROXMOX_BOT_TOKEN=${PROXMOX_BOT_TOKEN:-}
    volumes:
      - ./config:/app/config
      - ./state.json:/app/state.json
      - ./alerts_history.json:/app/alerts_history.json
      - ./logs:/var/log
    ports:
      - "8000:8000"  # If you add HTTP health check
    restart: unless-stopped
    networks:
      - proxmox-network
    # Mount Proxmox API (only if running on Proxmox host)
    # volumes:
    #   - /etc/pve:/etc/pve:ro
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp
      - /run

networks:
  proxmox-network:
    driver: bridge
